name: Feature request
description: Suggest something new
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the current system makes hard?
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: Proposed solution
      description: How would you want it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - new data source
        - new output format
        - new slash command
        - UI/UX
        - performance
        - docs
        - other
