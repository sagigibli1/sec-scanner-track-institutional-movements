name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear and short description of the bug.
      placeholder: When I run `/morning-brief`, the dashboard panel for...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. cd sec-scanner
        2. bash scripts/setup.sh
        3. ...
    validations:
      required: true

  - type: dropdown
    id: which-component
    attributes:
      label: Which component?
      multiple: true
      options:
        - install (setup.sh / verify.sh)
        - slash commands (.claude/commands)
        - live-pull.py
        - dashboard (HTML/CSS/JS)
        - Excel renderer
        - PDF renderer (Chrome)
        - newsletter renderer
        - terminal screener
        - other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 14.3 Apple Silicon / Ubuntu 22.04 / WSL
    validations:
      required: true

  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      placeholder: "Output of `claude --version`"

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste any relevant terminal output. Redact API keys.
      render: shell
